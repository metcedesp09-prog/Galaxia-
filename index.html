<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxia Animada</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #000010, #000);
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="galaxy"></canvas>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let maxStars = 2000;
let creationProgress = 0;

// Colores brillantes tipo galaxia
const colors = [
    "#ffffff", "#8be9fd", "#bd93f9",
    "#ff79c6", "#50fa7b", "#f1fa8c"
];

// Crear estrella
function createStar() {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * (canvas.width / 3);

    return {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angle: angle,
        radius: radius,
        size: Math.random() * 2,
        speed: 0.001 + Math.random() * 0.003,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 0
    };
}

// Dibujar estrellas
function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        star.angle += star.speed;

        const x = canvas.width / 2 + Math.cos(star.angle) * star.radius;
        const y = canvas.height / 2 + Math.sin(star.angle) * star.radius;

        // Aparecen poco a poco
        if (star.alpha < 1) star.alpha += 0.01;

        ctx.beginPath();
        ctx.arc(x, y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = hexToRGBA(star.color, star.alpha);
        ctx.shadowBlur = 10;
        ctx.shadowColor = star.color;
        ctx.fill();
    });
}

// Convertir color a rgba
function hexToRGBA(hex, alpha) {
    const r = parseInt(hex.substring(1, 3), 16);
    const g = parseInt(hex.substring(3, 5), 16);
    const b = parseInt(hex.substring(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
}

// Animación
function animate() {
    requestAnimationFrame(animate);

    // Se crean estrellas poco a poco
    if (creationProgress < maxStars) {
        for (let i = 0; i < 10; i++) {
            stars.push(createStar());
            creationProgress++;
        }
    }

    drawStars();
}

animate();

// Ajuste al cambiar tamaño
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
